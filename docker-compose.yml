version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    environment:
      - API_BASE_URL=http://api:8000
    command: streamlit run app/ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
