<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="636">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="36" text-anchor="middle" font-size="16" font-family="sans-serif" font-size="18" fill="#111827">计算机视觉实验pipeline示意图</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker></defs>
<rect x="130" y="60" width="220" height="50" rx="6" fill="#eef2ff" stroke="#111827" stroke-width="2"/>
<text x="240" y="90" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827">数据增强模块（Data Augmentation）：圆角矩形，内含旋转</text>
<line x1="240" y1="110" x2="240" y2="146" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="130" y="146" width="220" height="50" rx="6" fill="#eef2ff" stroke="#111827" stroke-width="2"/>
<text x="240" y="176" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827">特征提取模块（Feature Extraction）：圆角矩形，内含卷</text>
<line x1="240" y1="196" x2="240" y2="232" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="130" y="232" width="220" height="50" rx="6" fill="#eef2ff" stroke="#111827" stroke-width="2"/>
<text x="240" y="262" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827">模型训练模块（Model Training）：圆角矩形，内含神经网络层</text>
<line x1="240" y1="282" x2="240" y2="318" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="130" y="318" width="220" height="50" rx="6" fill="#eef2ff" stroke="#111827" stroke-width="2"/>
<text x="240" y="348" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827">分类输出模块（Classification Output）：圆角矩形，</text>
<line x1="240" y1="368" x2="240" y2="404" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="130" y="404" width="220" height="50" rx="6" fill="#eef2ff" stroke="#111827" stroke-width="2"/>
<text x="240" y="434" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827">从左到右的箭头连接线（带箭头，深蓝色）</text>
<line x1="240" y1="454" x2="240" y2="490" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="130" y="490" width="220" height="50" rx="6" fill="#eef2ff" stroke="#111827" stroke-width="2"/>
<text x="240" y="520" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#111827">模块下方的灰色辅助对齐线（虚线）</text>
</svg>